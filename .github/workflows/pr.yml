# Template: NestJS Project - Pull Request
#
# Complete PR validation workflow for NestJS projects with Docker and Helm
# Includes: NestJS CI (lint, test, build), Docker testing, Helm chart testing
#
# Usage:
#   1. Copy this file to your project's .github/workflows/pr.yml
#   2. Modify the options below as needed
#   3. Remove jobs you don't need (e.g., helm-test if no charts)

name: Pull Request

on:
  pull_request:
    branches: [main, develop]
    # Uncomment to trigger only on specific file changes:
    # paths:
    #   - 'src/**'
    #   - 'package*.json'
    #   - 'Dockerfile*'
    #   - 'charts/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  # NestJS CI - Lint, Test, Build
  nest-ci:
    name: NestJS CI
    uses: mandacode-lab/workflows/.github/workflows/nest-ci.yml@main
    with:
      node-version: "25"

  # Docker Test - Lint, Security Scan, Build Verification
  docker-test:
    name: Docker Test
    needs: nest-ci
    uses: mandacode-lab/workflows/.github/workflows/docker-test.yml@main
    with:
      # Images to test (REQUIRED)
      images: |
        [
          {"dockerfile": "app.Dockerfile"},
          {"dockerfile": "mig.Dockerfile"}
        ]
      # Multiple images example:
      # images: |
      #   [
      #     {"dockerfile": "Dockerfile"},
      #     {"dockerfile": "Dockerfile.alpine"}
      #   ]

      base-path: "docker"
      # build-context: "."
      # platforms: "linux/amd64"
      # test-build-only: true

      # Linting
      enable-hadolint: true
      # hadolint-version: "v2.14.0"

      # Security scanning
      enable-trivy: true
      trivy-severity: "HIGH,CRITICAL"
